  <style>
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:'DM Sans',sans-serif}
.app-shell{width:100%;height:100%;max-width:430px;margin:0 auto;position:relative;overflow:hidden;display:flex;flex-direction:column}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.scroll-area::-webkit-scrollbar{display:none}
.playfair{font-family:'Playfair Display',Georgia,serif}
.state-card{transition:transform .25s ease,box-shadow .25s ease}
.state-card:active{transform:scale(.97)}
.tab-btn{transition:all .2s ease}
.slide-in{animation:slideIn .35s ease forwards}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.slide-out{animation:slideOut .3s ease forwards}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}
.fade-up{animation:fadeUp .4s ease forwards}
@keyframes fadeUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.crowd-low{background:linear-gradient(135deg,#065f46,#047857)}
.crowd-med{background:linear-gradient(135deg,#92400e,#b45309)}
.crowd-high{background:linear-gradient(135deg,#991b1b,#dc2626)}
.info-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600}
.detail-section{padding:16px;margin-bottom:8px;border-radius:16px}
.gradient-overlay{background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.3) 50%,rgba(0,0,0,.05) 100%)}
.search-bar{backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.pulse-dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.bottom-nav{backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.weather-icon{font-size:28px}
.budget-bar{height:6px;border-radius:3px;overflow:hidden}
.budget-fill{height:100%;border-radius:3px;transition:width .6s ease}
.itinerary-card{position:relative;overflow:hidden;transition:all .3s ease}
.itinerary-card:hover{transform:translateY(-4px);box-shadow:0 12px 24px rgba(249,115,22,.15)}
.trip-item{animation:slideIn .4s ease forwards;opacity:0}
.delete-btn{opacity:0;transition:opacity .2s ease}
.trip-item:hover .delete-btn{opacity:1}
.badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase}
.recommendation-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:380px){.recommendation-grid{grid-template-columns:1fr}}
</style>

let favorites = JSON.parse(localStorage.getItem('bd_favs') || '[]');
let currentRegion = 'all';
let searchTerm = '';

function updateClock(){
  const n=new Date();
  document.getElementById('clockDisplay').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}
updateClock();setInterval(updateClock,30000);

function getCrowdClass(c){return c==='low'?'crowd-low':c==='med'?'crowd-med':'crowd-high'}
function getCrowdLabel(c){return c==='low'?'🟢 Low Crowd':c==='med'?'🟡 Moderate':'🔴 High Crowd'}
function getCrowdEmoji(c){return c==='low'?'🟢':c==='med'?'🟡':'🔴'}

function isFav(id){return favorites.includes(id)}
function toggleFav(id,e){
  if(e)e.stopPropagation();
  if(isFav(id))favorites=favorites.filter(f=>f!==id);
  else favorites.push(id);
  localStorage.setItem('bd_favs',JSON.stringify(favorites));
  renderStates();
}

function getFilteredStates(){
  let filtered=states.filter(s=>s.budget); // filter out any incomplete entries
  if(currentRegion!=='all')filtered=filtered.filter(s=>s.region===currentRegion);
  if(searchTerm){
    const t=searchTerm.toLowerCase();
    filtered=filtered.filter(s=>
      s.name.toLowerCase().includes(t)||
      s.tagline.toLowerCase().includes(t)||
      s.food.toLowerCase().includes(t)||
      s.places.some(p=>p.toLowerCase().includes(t))
    );
  }
  return filtered;
}

function calcTripDays(){
  const start=new Date(document.getElementById('tripStart').value);
  const end=new Date(document.getElementById('tripEnd').value);
  if(start&&end&&end>=start){
    const days=Math.floor((end-start)/(1000*60*60*24))+1;
    document.getElementById('tripDaysDisplay').textContent=`${days} day${days!==1?'s':''}`;
  }
}

function saveTrip(){
  const name=document.getElementById('tripName').value.trim();
  const start=document.getElementById('tripStart').value;
  const end=document.getElementById('tripEnd').value;
  const budget=document.getElementById('tripBudget').value.trim();
  const states=[...document.querySelectorAll('.tripState:checked')].map(cb=>cb.value);
  const days=Math.floor((new Date(end)-new Date(start))/(1000*60*60*24))+1;
  
  if(!name||!start||!end||!states.length||!budget){
    alert('Please fill all fields and select at least one state');
    return;
  }
  
  itineraryTrips.push({name,startDate:start,endDate:end,days,states,budget});
  localStorage.setItem('bd_trips',JSON.stringify(itineraryTrips));
  closeItineraryModal();
  renderItinerary();
}

}

function sanitizeInput(text){
  return text.toLowerCase().trim();
}

function findBestResponse(input){
  const sanitized=sanitizeInput(input);
  
  if(/hello|hi|hey|namaste|greet/.test(sanitized)) return travelResponses.greetings[Math.floor(Math.random()*travelResponses.greetings.length)];
  if(/budget|cost|price|afford|cheap|expensive/.test(sanitized)) return travelResponses.budget[Math.floor(Math.random()*travelResponses.budget.length)];
  if(/best time|when|season|month|weather/.test(sanitized)) return travelResponses.best_time[Math.floor(Math.random()*travelResponses.best_time.length)];
  if(/crowd|busy|peak|visit|tourist|rush/.test(sanitized)) return travelResponses.crowd[Math.floor(Math.random()*travelResponses.crowd.length)];
  if(/food|eat|cuisine|dish|restaurant|taste/.test(sanitized)) return travelResponses.food[Math.floor(Math.random()*travelResponses.food.length)];
  if(/permit|ilp|visa|document|northeast/.test(sanitized)) return travelResponses.permits[Math.floor(Math.random()*travelResponses.permits.length)];
  if(/weather|temp|rain|snow|hot|cold|monsoon/.test(sanitized)) return travelResponses.weather[Math.floor(Math.random()*travelResponses.weather.length)];
  if(/train|flight|bus|transport|travel|how to go|reach/.test(sanitized)) return travelResponses.transportation[Math.floor(Math.random()*travelResponses.transportation.length)];
  if(/health|medical|vaccine|sick|disease|safe/.test(sanitized)) return travelResponses.health[Math.floor(Math.random()*travelResponses.health.length)];
  
  // Check for state names
  for(let s of states){
    if(sanitized.includes(s.name.toLowerCase())){
      const parts=[`${s.emoji} ${s.name}: ${s.tagline}`,`Perfect time: ${s.weather.best}`,`Budget: ${s.budget.mid}/day`,`Known for: ${s.culture}`,`Don't miss: ${s.places.slice(0,2).join(', ')}`];
      return parts.join('\n');
    }
  }
  
  return travelResponses.default[Math.floor(Math.random()*travelResponses.default.length)];
}

function sendMessage(){
  const input=document.getElementById('chatInput');
  const msg=input.value.trim();
  if(!msg)return;
  
  const chatMessages=document.getElementById('chatMessages');
  
  // User message
  const userDiv=document.createElement('div');
  userDiv.style.cssText='display:flex;justify-content:flex-end;animation:slideIn .3s ease';
  userDiv.innerHTML=`<div style="max-width:70%;padding:10px 14px;border-radius:14px;background:#f97316;color:#fff;font-size:13px;line-height:1.4">${msg}</div>`;
  chatMessages.appendChild(userDiv);
  
  input.value='';
  
  // Bot typing indicator
  const typingDiv=document.createElement('div');
  typingDiv.style.cssText='display:flex;gap:4px;align-items:center;animation:slideIn .3s ease';
  typingDiv.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:#a3a3a3;animation:pulse 1.5s infinite"></span><span style="width:8px;height:8px;border-radius:50%;background:#a3a3a3;animation:pulse 1.5s infinite 0.2s"></span><span style="width:8px;height:8px;border-radius:50%;background:#a3a3a3;animation:pulse 1.5s infinite 0.4s"></span>`;
  chatMessages.appendChild(typingDiv);
  chatMessages.scrollTop=chatMessages.scrollHeight;
  
  // Simulate response delay
  setTimeout(()=>{
    typingDiv.remove();
    const response=findBestResponse(msg);
    const botDiv=document.createElement('div');
    botDiv.style.cssText='display:flex;justify-content:flex-start;animation:slideIn .3s ease';
    botDiv.innerHTML=`<div style="max-width:70%;padding:10px 14px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#d4d4d4;font-size:13px;line-height:1.4;white-space:pre-wrap">${response}</div>`;
    chatMessages.appendChild(botDiv);
    chatMessages.scrollTop=chatMessages.scrollHeight;
    
    lucide.createIcons();
  },1000+Math.random()*500);
}
